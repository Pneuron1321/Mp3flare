<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ВОЛЧОК — 2 деки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --bg-0:#070912; --bg-1:#0b0e1b; --bg-2:#1a2036;
    --ink:#ece7db; --muted:#838aa2; --line:#222a42;
    --warm:#ffb86b; --warm-hot:#ff6a3d; --cool:#5be0d0; --cool-2:#58b6ff; --rev:#9a7bff;
    --surf:rgba(20,25,44,.7); --surf-line:rgba(255,255,255,.06);
    --a:#ffb86b; --b:#58b6ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    margin:0; color:var(--ink); font-family:"Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(circle at 50% 44%, var(--bg-2) 0%, var(--bg-1) 56%, var(--bg-0) 100%);
    overflow:hidden; user-select:none; -webkit-user-select:none; display:flex; flex-direction:column; min-height:100%;
  }
  header{padding:12px 16px 2px; text-align:center; flex:0 0 auto}
  .brand{font-weight:700; letter-spacing:.4em; font-size:13px; text-indent:.4em}
  .tag{font-size:10px; letter-spacing:.26em; color:var(--muted); text-transform:uppercase; margin-top:4px}

  .deck{flex:0 0 auto; padding:8px 14px 4px}
  .deck-head{display:flex; align-items:center; gap:8px; margin-bottom:5px}
  .deck-id{font-family:"Space Mono",monospace; font-weight:700; font-size:13px; width:18px; text-align:center}
  .deck.a .deck-id{color:var(--a)} .deck.b .deck-id{color:var(--b)}
  .deck-name{font-size:11.5px; color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .wave-wrap{position:relative; height:46px; cursor:pointer}
  .wave-wrap canvas{display:block; width:100%; height:100%}
  .wave-empty{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:11.5px; color:var(--muted); letter-spacing:.04em; cursor:pointer}

  .stage{flex:1 1 auto; position:relative; min-height:230px}
  #scene{position:absolute; inset:0}
  #scene canvas{display:block; width:100%; height:100%; touch-action:none}
  .readout{position:absolute; left:0; right:0; bottom:6px; text-align:center; pointer-events:none}
  .rate{font-family:"Space Mono",monospace; font-size:clamp(26px,7vw,40px); font-weight:700; line-height:1; transition:color .15s}
  .bound{font-size:10px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); margin-top:6px}
  .threefail{position:absolute; inset:0; display:none; align-items:center; justify-content:center; padding:20px; text-align:center; color:var(--muted); font-size:13px}

  button{font-family:inherit; color:var(--ink); cursor:pointer; border:1px solid var(--surf-line); background:var(--surf);
    border-radius:11px; padding:8px 11px; font-size:12.5px; font-weight:500; backdrop-filter:blur(8px);
    transition:border-color .15s, background .15s, transform .06s, color .15s, box-shadow .15s}
  button:hover{border-color:rgba(255,255,255,.16)} button:active{transform:translateY(1px)}
  button:focus-visible{outline:2px solid var(--cool-2); outline-offset:2px}
  .mini{width:40px; height:40px; padding:0; border-radius:50%; display:grid; place-items:center; font-size:15px}
  .bind{min-width:54px; font-family:"Space Mono",monospace; font-weight:700; letter-spacing:.02em}
  .deck.a .bind.on{color:var(--a); box-shadow:inset 0 0 0 1px rgba(255,184,107,.5), 0 0 14px rgba(255,184,107,.25)}
  .deck.b .bind.on{color:var(--b); box-shadow:inset 0 0 0 1px rgba(88,182,255,.5), 0 0 14px rgba(88,182,255,.25)}

  .controls{flex:0 0 auto; display:flex; flex-direction:column; gap:8px; padding:8px 14px 16px}
  .row{display:flex; gap:8px; align-items:center; justify-content:center; flex-wrap:wrap}
  .seg{display:inline-flex; background:var(--surf); border:1px solid var(--surf-line); border-radius:11px; padding:3px; gap:2px; backdrop-filter:blur(8px)}
  .seg button{border:none; background:transparent; padding:7px 11px; border-radius:9px; font-size:12px; color:var(--muted)}
  .seg button.on{background:linear-gradient(180deg,rgba(255,184,107,.22),rgba(255,184,107,.1)); color:var(--ink); box-shadow:inset 0 0 0 1px rgba(255,184,107,.3)}
  .toggle.on{color:var(--cool); box-shadow:inset 0 0 0 1px rgba(91,224,208,.42); background:linear-gradient(180deg,rgba(91,224,208,.16),rgba(91,224,208,.06))}
  .rec.on{color:#ff7a6a; box-shadow:inset 0 0 0 1px rgba(255,90,61,.5); animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:inset 0 0 0 1px rgba(255,90,61,.5)}50%{box-shadow:inset 0 0 0 1px rgba(255,90,61,.5),0 0 16px rgba(255,90,61,.45)}}
  .dl{color:var(--warm); box-shadow:inset 0 0 0 1px rgba(255,184,107,.4)} .dl[hidden]{display:none}

  .xfade{flex:1; max-width:320px; display:flex; align-items:center; gap:9px; font-family:"Space Mono",monospace; font-size:12px; color:var(--muted)}
  .xfade input{flex:1; -webkit-appearance:none; appearance:none; height:5px; border-radius:5px; background:linear-gradient(90deg,var(--a),#2a3350,var(--b)); outline:none}
  .xfade input::-webkit-slider-thumb{-webkit-appearance:none; width:18px; height:18px; border-radius:50%; background:var(--ink); box-shadow:0 0 8px rgba(255,255,255,.4); cursor:pointer}
  .xfade input::-moz-range-thumb{width:18px; height:18px; border:none; border-radius:50%; background:var(--ink); cursor:pointer}
  input[type=file]{display:none}
  @media (prefers-reduced-motion:reduce){.rec.on{animation:none}}
</style>
</head>
<body>
  <header>
    <div class="brand">ВОЛЧОК</div>
    <div class="tag">две деки · один волчок</div>
  </header>

  <!-- ДЕКА A -->
  <div class="deck a" data-deck="A">
    <div class="deck-head">
      <span class="deck-id">A</span>
      <span class="deck-name" id="nameA">—</span>
      <button class="mini" data-load="A" title="Загрузить трек на деку A">↑</button>
      <button class="mini" data-play="A" title="Играть / пауза">▶</button>
      <button class="bind on" data-bind="A" title="Привязать волчок к деке A">A ⟲</button>
    </div>
    <div class="wave-wrap">
      <canvas id="waveA"></canvas>
      <div class="wave-empty" data-load="A">брось трек на деку A</div>
    </div>
  </div>

  <!-- ВОЛЧОК 3D -->
  <div class="stage">
    <div id="scene"></div>
    <div class="threefail" id="threefail">не загрузился 3D-движок (нужен интернет для three.js).<br>проверь сеть и обнови страницу.</div>
    <div class="readout">
      <div class="rate" id="rateVal">1.00×</div>
      <div class="bound" id="boundLabel">привязан: A</div>
    </div>
  </div>

  <!-- ДЕКА B -->
  <div class="deck b" data-deck="B">
    <div class="deck-head">
      <span class="deck-id">B</span>
      <span class="deck-name" id="nameB">—</span>
      <button class="mini" data-load="B" title="Загрузить трек на деку B">↑</button>
      <button class="mini" data-play="B" title="Играть / пауза">▶</button>
      <button class="bind" data-bind="B" title="Привязать волчок к деке B">B ⟲</button>
    </div>
    <div class="wave-wrap">
      <canvas id="waveB"></canvas>
      <div class="wave-empty" data-load="B">брось трек на деку B</div>
    </div>
  </div>

  <!-- ОБЩИЕ -->
  <div class="controls">
    <div class="row">
      <div class="seg" role="group" aria-label="Сила влияния волчка">
        <button data-mode="soft">Мягкий</button>
        <button data-mode="groove" class="on">Грув</button>
        <button data-mode="scratch">Скретч</button>
      </div>
      <button id="pitch" class="toggle">Фиксировать тон</button>
      <button id="haptic" class="toggle on">Шероховатость</button>
    </div>
    <div class="row">
      <div class="xfade"><span>A</span><input type="range" id="xfade" min="0" max="100" value="50"><span>B</span></div>
      <button id="rec" class="rec">● Запись</button>
      <button id="dl" class="dl" hidden>↓ WAV</button>
    </div>
  </div>

  <!-- без accept: iOS красит серым файлы с неопознанным типом (ogg/opus из телеграма) и все видео; фильтрует сам декодер -->
  <input type="file" id="fileA">
  <input type="file" id="fileB">

<script>
/* =========================================================================
   ВОЛЧОК v2 — две деки + общий 3D-волчок
   Деки: два AudioWorklet-ресемплера (varispeed / OLA pitch-lock).
   Волчок: 3D-диск (three.js), физика «трение пальца + релаксация».
   Привязка: волчок гонит скорость той деки, к которой привязан.
   ========================================================================= */

/* ---- НАСТРОЙКА ОЩУЩЕНИЯ (крути под себя) ----
   mu = сила сцепления пальца с диском, lambda = скорость возврата к 1×, rMax = потолок (с реверсом). */
const MODES = {
  soft:    { mu: 3.0,  lambda: 5.5, rMax: 1.5 },
  groove:  { mu: 8.0,  lambda: 2.2, rMax: 2.6 },
  scratch: { mu: 16.0, lambda: 0.7, rMax: 4.0 },
};
const SPIN_1X_RADPS = Math.PI;   // визуальная скорость диска при 1×
const OMEGA_REF     = Math.PI;   // скорость пальца, дающая 1×
const RATE_TC       = 0.02;      // сглаживание скорости в аудио
const DIR           = 1;         // если вперёд/назад перепутаны — поставь -1
/* ---- 3D-сцена (если ракурс не нравится — крути здесь) ---- */
const TILT   = -1.02;            // наклон диска «в глубину» (рад)
const CAM    = {x:0, y:1.7, z:4.3};
const LOOK   = {x:0, y:-0.15, z:0};
const FOV    = 42;
/* ---- тактильная «шероховатость» (вибро-текстура колеса) ---- */
const HAPTIC_GROOVES = 56;     // бороздок на оборот: плотность шероховатости
const HAPTIC_MIN_MS  = 16;     // мин. интервал между импульсами (троттлинг мотора)
const HAPTIC_PULSE   = [5,16]; // длительность импульса, мс: [слабое скольжение → сильное]
/* --------------------------------------------------------- */

// ---- AudioWorklet (тот же движок, что в v1) ----
const WORKLET = `
class ScratchEngine extends AudioWorkletProcessor {
  static get parameterDescriptors(){ return [{ name:'rate', defaultValue:1, automationRate:'a-rate' }]; }
  constructor(){
    super(); this.L=null;this.R=null;this.len=0;this.pos=0;this.mode=0;this.eps=0.02;
    this.W=1024;this.H=512;this.win=new Float32Array(this.W);
    for(let i=0;i<this.W;i++) this.win[i]=0.5*(1-Math.cos(2*Math.PI*i/(this.W-1)));
    this.olaL=new Float32Array(this.W);this.olaR=new Float32Array(this.W);this.readStart=0;
    this.gL=new Float32Array(this.H);this.gR=new Float32Array(this.H);this.gPos=this.H;this.rep=0;
    this.port.onmessage=(e)=>{const d=e.data;
      if(d.type==='load'){this.L=new Float32Array(d.left);this.R=new Float32Array(d.right);this.len=this.L.length;this.pos=0;this.readStart=0;this._r();}
      else if(d.type==='mode'){if(d.mode!==this.mode){this.mode=d.mode; if(this.mode===1){this.readStart=this.pos;this._r();} else {this.pos=this.readStart;}}}
      else if(d.type==='seek'){this.pos=d.pos*this.len;this.readStart=this.pos;this._r();}
    };
  }
  _r(){this.olaL.fill(0);this.olaR.fill(0);this.gPos=this.H;}
  _s(a,p){const n=this.len;let i=Math.floor(p);const t=p-i;
    const i0=((i-1)%n+n)%n,i1=((i)%n+n)%n,i2=((i+1)%n+n)%n,i3=((i+2)%n+n)%n;
    const p0=a[i0],p1=a[i1],p2=a[i2],p3=a[i3];
    const A=0.5*(-p0+3*p1-3*p2+p3),B=0.5*(2*p0-5*p1+4*p2-p3),C=0.5*(-p0+p2);
    return ((A*t+B)*t+C)*t+p1;}
  _g(r){const a=Math.min(1,Math.abs(r)/this.eps);return a*a*(3-2*a);}
  _hop(rate){const W=this.W,H=this.H,n=this.len;const rs=Math.floor(this.readStart);
    for(let k=0;k<W;k++){const idx=((rs+k)%n+n)%n;const w=this.win[k];this.olaL[k]+=this.L[idx]*w;this.olaR[k]+=this.R[idx]*w;}
    for(let k=0;k<H;k++){this.gL[k]=this.olaL[k];this.gR[k]=this.olaR[k];}
    this.olaL.copyWithin(0,H);this.olaR.copyWithin(0,H);this.olaL.fill(0,W-H);this.olaR.fill(0,W-H);
    this.readStart+=H*rate;}
  process(inputs,outputs,parameters){
    const out=outputs[0];const oL=out[0],oR=out[1]||out[0];const N=oL.length;
    if(!this.L) return true; const ra=parameters.rate;
    if(this.mode===0){
      for(let i=0;i<N;i++){const r=ra.length>1?ra[i]:ra[0];const g=this._g(r);
        oL[i]=this._s(this.L,this.pos)*g;oR[i]=this._s(this.R,this.pos)*g;
        this.pos+=r; if(this.pos>=this.len)this.pos-=this.len; else if(this.pos<0)this.pos+=this.len;}
    } else {
      const r=ra.length>1?ra[N>>1]:ra[0];const g=this._g(r);
      for(let i=0;i<N;i++){if(this.gPos>=this.H){this._hop(r);this.gPos=0;} oL[i]=this.gL[this.gPos]*g;oR[i]=this.gR[this.gPos]*g;this.gPos++;}
      this.pos=((this.readStart%this.len)+this.len)%this.len;
    }
    this.rep+=N; if(this.rep>=2048){this.rep=0;this.port.postMessage({type:'pos',pos:this.len?this.pos/this.len:0});}
    return true;
  }
}
class TapRecorder extends AudioWorkletProcessor {
  constructor(){super();this.rec=false;this.cap=16384;this.bL=new Float32Array(this.cap);this.bR=new Float32Array(this.cap);this.fill=0;
    this.port.onmessage=(e)=>{if(e.data.type==='rec'){if(e.data.on){this.fill=0;this.rec=true;}else{this.rec=false;this._f();this.port.postMessage({type:'recdone'});}}};}
  _f(){if(this.fill>0){this.port.postMessage({type:'chunk',l:this.bL.slice(0,this.fill),r:this.bR.slice(0,this.fill)});this.fill=0;}}
  process(inputs){const inp=inputs[0];
    if(this.rec&&inp&&inp.length){const l=inp[0],r=inp[1]||inp[0];
      for(let i=0;i<l.length;i++){this.bL[this.fill]=l[i];this.bR[this.fill]=r[i];this.fill++;
        if(this.fill>=this.cap){this.port.postMessage({type:'chunk',l:this.bL.slice(0),r:this.bR.slice(0)});this.fill=0;}}}
    return true;}
}
registerProcessor('scratch-engine', ScratchEngine);
registerProcessor('tap-recorder', TapRecorder);
`;

// ---- состояние волчка ----
const V = { r:1, r0:1, omegaFinger:0, lastMoveT:0, touching:false, lastAng:0, lastT:0, mode:MODES.groove, pitchLock:false };

// ---- тактильная шероховатость ----
const HAPTIC = { enabled:true, accum:0, lastVib:0 };
let iosHapticInput=null, iosHapticLabel=null;
function setupIOSHaptic(){
  // iOS Safari не поддерживает Vibration API. Экспериментальный трюк: switch-чекбокс (iOS 17.4+).
  const label=document.createElement('label');
  label.style.cssText='position:absolute;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none';
  const input=document.createElement('input'); input.type='checkbox'; input.setAttribute('switch','');
  label.appendChild(input); document.body.appendChild(label);
  iosHapticInput=input; iosHapticLabel=label;
}
function haptic(dur){
  if(!HAPTIC.enabled) return;
  if(navigator.vibrate){ navigator.vibrate(dur); return; }
  if(iosHapticInput){ iosHapticInput.checked=!iosHapticInput.checked; iosHapticLabel.click(); }
}

// ---- деки ----
function Deck(id){
  return { id, node:null, gain:null, playing:false, bound:(id==='A'), loaded:false,
           playhead:0, name:'', dpr:1, cacheDim:null, cacheBright:null,
           wave: document.getElementById('wave'+id), wctx:null, emptyEl:null };
}
const decks = { A:Deck('A'), B:Deck('B') };
for(const id in decks){ decks[id].wctx = decks[id].wave.getContext('2d'); decks[id].emptyEl = document.querySelector('.deck.'+id.toLowerCase()+' .wave-empty'); }

// ---- общий аудио-граф ----
const AUDIO = { ctx:null, master:null, analyser:null, anaBuf:null, rec:null, recChunks:[], recording:false, lastWav:null };

async function ensureAudio(){
  if(AUDIO.ctx){ if(AUDIO.ctx.state==='suspended') await AUDIO.ctx.resume(); return; }
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  await ctx.audioWorklet.addModule(URL.createObjectURL(new Blob([WORKLET],{type:'application/javascript'})));

  const master = ctx.createGain(); master.gain.value=0.95;
  const analyser = ctx.createAnalyser(); analyser.fftSize=256;
  const rec = new AudioWorkletNode(ctx,'tap-recorder',{numberOfInputs:1,numberOfOutputs:1,outputChannelCount:[2]});
  const silent = ctx.createGain(); silent.gain.value=0;

  for(const id in decks){
    const d = decks[id];
    d.node = new AudioWorkletNode(ctx,'scratch-engine',{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[2]});
    d.gain = ctx.createGain();
    d.node.connect(d.gain); d.gain.connect(master);
    d.node.port.onmessage = e => { if(e.data.type==='pos') d.playhead = e.data.pos; };
    if(V.pitchLock) d.node.port.postMessage({type:'mode',mode:1});
  }
  master.connect(analyser); analyser.connect(ctx.destination);
  master.connect(rec); rec.connect(silent); silent.connect(ctx.destination);
  rec.port.onmessage = e => {
    if(e.data.type==='chunk') AUDIO.recChunks.push({l:e.data.l,r:e.data.r});
    else if(e.data.type==='recdone') finalizeRecording();
  };

  AUDIO.ctx=ctx; AUDIO.master=master; AUDIO.analyser=analyser; AUDIO.rec=rec;
  AUDIO.anaBuf=new Uint8Array(analyser.frequencyBinCount);
  applyCrossfade();
}

async function loadFile(id, file){
  if(!file) return;
  await ensureAudio();
  const d = decks[id];
  document.getElementById('name'+id).textContent='декодирую…';
  let audio;
  try { audio = await AUDIO.ctx.decodeAudioData(await file.arrayBuffer()); }
  catch(err){ document.getElementById('name'+id).textContent='формат не декодируется — конвертни в mp3 / m4a / wav'; return; }
  const L = new Float32Array(audio.getChannelData(0));
  const R = audio.numberOfChannels>1 ? new Float32Array(audio.getChannelData(1)) : new Float32Array(L);
  d.peaks = computePeaks(L,R,900);
  buildWaveCache(d);
  d.node.port.postMessage({type:'load',left:L.buffer,right:R.buffer},[L.buffer,R.buffer]);
  d.loaded=true; d.playhead=0; d.name=file.name.replace(/\.[^.]+$/,'');
  document.getElementById('name'+id).textContent=d.name;
  d.emptyEl.style.display='none';
  setPlaying(d, true);
}

function computePeaks(L,R,buckets){
  const n=L.length, per=Math.max(1,Math.floor(n/buckets)), out=Math.ceil(n/per);
  const mins=new Float32Array(out), maxs=new Float32Array(out);
  for(let b=0;b<out;b++){ let mn=1,mx=-1; const s=b*per,e=Math.min(n,s+per);
    for(let i=s;i<e;i++){const v=(L[i]+R[i])*0.5; if(v<mn)mn=v; if(v>mx)mx=v;} mins[b]=mn;maxs[b]=mx; }
  return {mins,maxs};
}

function fit(c){ const dpr=Math.min(2,window.devicePixelRatio||1); const r=c.getBoundingClientRect();
  c.width=Math.round(r.width*dpr); c.height=Math.round(r.height*dpr); return dpr; }

function buildWaveCache(d){
  if(!d.peaks) return;
  d.dpr = fit(d.wave);
  const W=d.wave.width, H=d.wave.height, mid=H/2, n=d.peaks.mins.length;
  const make = (color)=>{ const c=document.createElement('canvas'); c.width=W; c.height=H; const g=c.getContext('2d');
    g.strokeStyle=color; g.lineWidth=Math.max(1,d.dpr*0.9);
    for(let x=0;x<W;x++){ const bi=Math.min(n-1,Math.floor(x/W*n));
      const top=mid - d.peaks.maxs[bi]*mid*0.92, bot=mid - d.peaks.mins[bi]*mid*0.92;
      g.beginPath(); g.moveTo(x+.5,top); g.lineTo(x+.5,Math.max(bot,top+d.dpr)); g.stroke(); }
    return c; };
  const accent = d.id==='A' ? 'rgba(255,184,107,.95)' : 'rgba(88,182,255,.95)';
  d.cacheDim = make('rgba(131,138,162,.26)');
  d.cacheBright = make(accent);
}

function drawWaveDeck(d){
  const W=d.wave.width, H=d.wave.height; d.wctx.clearRect(0,0,W,H);
  if(!d.cacheDim) return;
  d.wctx.drawImage(d.cacheDim,0,0);
  const head=d.playhead*W;
  d.wctx.save(); d.wctx.beginPath(); d.wctx.rect(0,0,head,H); d.wctx.clip(); d.wctx.drawImage(d.cacheBright,0,0); d.wctx.restore();
  d.wctx.strokeStyle = d.id==='A' ? 'rgba(255,217,160,.9)' : 'rgba(150,205,255,.9)';
  d.wctx.lineWidth=1.5*d.dpr; d.wctx.beginPath(); d.wctx.moveTo(head+.5,0); d.wctx.lineTo(head+.5,H); d.wctx.stroke();
}

function setPlaying(d,on){ d.playing=on; const b=document.querySelector('[data-play="'+d.id+'"]'); b.textContent=on?'⏸':'▶'; }

// ---- запись микса -> WAV ----
function toggleRecording(){
  if(!AUDIO.ctx) return;
  if(!AUDIO.recording){ AUDIO.recChunks=[]; AUDIO.lastWav=null; AUDIO.rec.port.postMessage({type:'rec',on:true});
    AUDIO.recording=true; recBtn.classList.add('on'); recBtn.textContent='■ Стоп'; dlBtn.hidden=true; }
  else { AUDIO.rec.port.postMessage({type:'rec',on:false}); AUDIO.recording=false; recBtn.classList.remove('on'); recBtn.textContent='● Запись'; }
}
function finalizeRecording(){
  let total=0; for(const c of AUDIO.recChunks) total+=c.l.length; if(!total) return;
  const L=new Float32Array(total),R=new Float32Array(total); let o=0;
  for(const c of AUDIO.recChunks){ L.set(c.l,o); R.set(c.r,o); o+=c.l.length; }
  AUDIO.lastWav = encodeWAV(L,R,AUDIO.ctx.sampleRate); dlBtn.hidden=false;
  downloadBlob(AUDIO.lastWav,'volchok-mix.wav');
}
function encodeWAV(L,R,sr){
  const len=L.length, v=new DataView(new ArrayBuffer(44+len*4));
  const ws=(o,s)=>{for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i));};
  ws(0,'RIFF');v.setUint32(4,36+len*4,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);
  v.setUint16(20,1,true);v.setUint16(22,2,true);v.setUint32(24,sr,true);v.setUint32(28,sr*4,true);
  v.setUint16(32,4,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,len*4,true);
  let off=44; for(let i=0;i<len;i++){ let l=Math.max(-1,Math.min(1,L[i])),r=Math.max(-1,Math.min(1,R[i]));
    v.setInt16(off,l<0?l*0x8000:l*0x7FFF,true);off+=2; v.setInt16(off,r<0?r*0x8000:r*0x7FFF,true);off+=2; }
  return new Blob([v.buffer],{type:'audio/wav'});
}
function downloadBlob(b,name){ const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),4000); }

// ---- кроссфейдер ----
function applyCrossfade(){ if(!decks.A.gain) return; const x=xfadeEl.value/100;
  decks.A.gain.gain.setTargetAtTime(Math.cos(x*Math.PI/2),AUDIO.ctx.currentTime,0.02);
  decks.B.gain.gain.setTargetAtTime(Math.sin(x*Math.PI/2),AUDIO.ctx.currentTime,0.02); }

// ---- цвет по скорости ----
function lerp(a,b,t){return a+(b-a)*t;}
function hx(c){return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)];}
const C={hot:hx('#ff6a3d'),gold:hx('#ffb86b'),cool:hx('#5be0d0'),rev:hx('#9a7bff')};
function speedColor(r){ let a,b,t;
  if(r<0){a=C.cool;b=C.rev;t=Math.min(1,-r/2);}
  else if(r<1){a=C.cool;b=C.gold;t=r;}
  else {a=C.gold;b=C.hot;t=Math.min(1,(r-1)/2.2);}
  return [Math.round(lerp(a[0],b[0],t)),Math.round(lerp(a[1],b[1],t)),Math.round(lerp(a[2],b[2],t))]; }
const rgb=(c,al=1)=>`rgba(${c[0]},${c[1]},${c[2]},${al})`;

// =========================== 3D ВОЛЧОК (three.js) ===========================
let renderer, scene, camera, discSpin, discTilt, rim;
const THREE_OK = typeof THREE !== 'undefined';

function makeTopTexture(){
  const s=1024, c=document.createElement('canvas'); c.width=c.height=s; const g=c.getContext('2d'); const cx=s/2,cy=s/2;
  const rgrad=g.createRadialGradient(cx,cy,s*0.05,cx,cy,s*0.5);
  rgrad.addColorStop(0,'#232b46'); rgrad.addColorStop(0.7,'#161c30'); rgrad.addColorStop(1,'#0e1424');
  g.fillStyle=rgrad; g.beginPath(); g.arc(cx,cy,s*0.5,0,7); g.fill();
  for(let i=1;i<64;i++){ g.beginPath(); g.arc(cx,cy,s*0.5*(i/64),0,7); g.globalAlpha=0.02+0.02*((i%4)===0?1:0.3); g.strokeStyle='#ffffff'; g.lineWidth=1.4; g.stroke(); }
  g.globalAlpha=1;
  g.strokeStyle='#ffd9a0'; g.lineWidth=11; g.shadowColor='#ffb86b'; g.shadowBlur=26;
  g.beginPath(); g.moveTo(cx,cy*0.42); g.lineTo(cx,s*0.06); g.stroke(); g.shadowBlur=0;
  g.fillStyle='#fff3de'; g.beginPath(); g.arc(cx,s*0.085,16,0,7); g.fill();
  const hg=g.createRadialGradient(cx,cy,2,cx,cy,s*0.17);
  hg.addColorStop(0,'#1b2238'); hg.addColorStop(1,'#0f152a');
  g.fillStyle=hg; g.beginPath(); g.arc(cx,cy,s*0.17,0,7); g.fill();
  g.strokeStyle='rgba(255,217,160,.28)'; g.lineWidth=3; g.beginPath(); g.arc(cx,cy,s*0.17,0,7); g.stroke();
  g.fillStyle='rgba(255,255,255,.12)'; g.beginPath(); g.arc(cx,cy,s*0.035,0,7); g.fill();
  const t=new THREE.CanvasTexture(c); t.anisotropy=8; return t;
}

function init3D(){
  if(!THREE_OK){ document.getElementById('threefail').style.display='flex'; return; }
  const cont = document.getElementById('scene');
  const w=cont.clientWidth, h=cont.clientHeight;
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(FOV, w/h, 0.1, 100);
  camera.position.set(CAM.x,CAM.y,CAM.z); camera.lookAt(LOOK.x,LOOK.y,LOOK.z);
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
  renderer.setSize(w,h); renderer.setClearColor(0x000000,0);
  cont.appendChild(renderer.domElement);
  renderer.domElement.style.touchAction='none';

  // освещение: тёплый ключ + холодная заливка (карвед-стоун, deep bright)
  scene.add(new THREE.AmbientLight(0x3c4c70, 0.55));
  const key = new THREE.DirectionalLight(0xffe0b0, 1.15); key.position.set(2.5,5,3.5); scene.add(key);
  const fill = new THREE.PointLight(0x5be0d0, 0.45, 30); fill.position.set(-4,1.5,2.5); scene.add(fill);

  discTilt = new THREE.Group(); discTilt.rotation.x = TILT; scene.add(discTilt);
  discSpin = new THREE.Group(); discTilt.add(discSpin);

  const R=1.5, Hh=0.22;
  const sideMat = new THREE.MeshStandardMaterial({color:0x161c30, metalness:0.55, roughness:0.5});
  const topMat  = new THREE.MeshStandardMaterial({map:makeTopTexture(), metalness:0.25, roughness:0.55});
  const botMat  = new THREE.MeshStandardMaterial({color:0x0c1120, metalness:0.4, roughness:0.7});
  const body = new THREE.Mesh(new THREE.CylinderGeometry(R,R,Hh,96,1,false), [sideMat,topMat,botMat]);
  discSpin.add(body);

  rim = new THREE.Mesh(new THREE.TorusGeometry(R, 0.045, 18, 120),
        new THREE.MeshStandardMaterial({color:0xffb86b, emissive:0xffb86b, emissiveIntensity:1.3, metalness:0.3, roughness:0.4}));
  rim.rotation.x = Math.PI/2; rim.position.y = Hh/2; discTilt.add(rim);
}

function discCenterScreen(){
  if(!renderer) return {x:innerWidth/2,y:innerHeight/2};
  const v=new THREE.Vector3(0,0,0).project(camera);
  const r=renderer.domElement.getBoundingClientRect();
  return { x:r.left+(v.x*0.5+0.5)*r.width, y:r.top+(-v.y*0.5+0.5)*r.height };
}

function resize3D(){
  if(!renderer) return;
  const cont=document.getElementById('scene'); const w=cont.clientWidth,h=cont.clientHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
}

// =========================== ВВОД: палец на волчке ===========================
function bindWheelInput(){
  if(!renderer) return;
  const el = renderer.domElement;
  el.addEventListener('pointerdown', async e=>{ e.preventDefault(); await ensureAudio();
    el.setPointerCapture(e.pointerId); const c=discCenterScreen();
    V.touching=true; V.lastAng=Math.atan2(e.clientY-c.y, e.clientX-c.x); V.lastT=performance.now(); V.omegaFinger=0; V.lastMoveT=V.lastT; });
  el.addEventListener('pointermove', e=>{ if(!V.touching) return; const c=discCenterScreen();
    const ang=Math.atan2(e.clientY-c.y, e.clientX-c.x), now=performance.now();
    let d=ang-V.lastAng; if(d>Math.PI)d-=2*Math.PI; else if(d<-Math.PI)d+=2*Math.PI;
    const dt=(now-V.lastT)/1000; if(dt>0){ let w=(d/dt)*DIR; w=Math.max(-40,Math.min(40,w)); V.omegaFinger=w; V.lastMoveT=now; }
    V.lastAng=ang; V.lastT=now; });
  const end=e=>{ if(V.touching){ V.touching=false; try{el.releasePointerCapture(e.pointerId);}catch(_){} } };
  el.addEventListener('pointerup',end); el.addEventListener('pointercancel',end);
}

// =========================== КНОПКИ ===========================
const recBtn=document.getElementById('rec'), dlBtn=document.getElementById('dl'), xfadeEl=document.getElementById('xfade');
const rateVal=document.getElementById('rateVal'), boundLabel=document.getElementById('boundLabel'), pitchBtn=document.getElementById('pitch');
const hapticBtn=document.getElementById('haptic');
hapticBtn.addEventListener('click',()=>{ HAPTIC.enabled=!HAPTIC.enabled; hapticBtn.classList.toggle('on',HAPTIC.enabled);
  if(HAPTIC.enabled) haptic(14); });

document.querySelectorAll('[data-load]').forEach(b=> b.addEventListener('click',()=> document.getElementById('file'+b.dataset.load).click()));
document.getElementById('fileA').addEventListener('change',e=>loadFile('A',e.target.files[0]));
document.getElementById('fileB').addEventListener('change',e=>loadFile('B',e.target.files[0]));

document.querySelectorAll('[data-play]').forEach(b=> b.addEventListener('click', async ()=>{
  await ensureAudio(); const d=decks[b.dataset.play];
  if(!d.loaded){ document.getElementById('file'+d.id).click(); return; }
  setPlaying(d,!d.playing);
}));

document.querySelectorAll('[data-bind]').forEach(b=> b.addEventListener('click',()=>{
  const d=decks[b.dataset.bind]; d.bound=!d.bound; b.classList.toggle('on',d.bound); updateBoundLabel();
}));
function updateBoundLabel(){
  const on=[]; if(decks.A.bound)on.push('A'); if(decks.B.bound)on.push('B');
  boundLabel.textContent = on.length ? 'привязан: '+on.join('·') : 'свободен';
}

document.querySelectorAll('.seg button').forEach(b=> b.addEventListener('click',()=>{
  document.querySelectorAll('.seg button').forEach(x=>x.classList.remove('on')); b.classList.add('on'); V.mode=MODES[b.dataset.mode];
}));

pitchBtn.addEventListener('click', async ()=>{ await ensureAudio();
  V.pitchLock=!V.pitchLock; pitchBtn.classList.toggle('on',V.pitchLock);
  pitchBtn.textContent=V.pitchLock?'Тон зафиксирован':'Фиксировать тон';
  for(const id in decks) if(decks[id].node) decks[id].node.port.postMessage({type:'mode',mode:V.pitchLock?1:0});
});

recBtn.addEventListener('click', async ()=>{ await ensureAudio(); toggleRecording(); });
dlBtn.addEventListener('click',()=>{ if(AUDIO.lastWav) downloadBlob(AUDIO.lastWav,'volchok-mix.wav'); });
xfadeEl.addEventListener('input', applyCrossfade);

// перемотка кликом по волне
document.querySelectorAll('.wave-wrap').forEach(wrap=>{
  wrap.addEventListener('click', e=>{
    const id = wrap.parentElement.dataset.deck; const d=decks[id];
    if(!d.loaded || !d.node) return; // если пусто — сработает .wave-empty -> загрузка
    const r=d.wave.getBoundingClientRect(); const frac=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    d.node.port.postMessage({type:'seek',pos:frac}); d.playhead=frac;
  });
});

// drag&drop: левая половина окна -> A, правая -> B
['dragover','drop'].forEach(t=> document.addEventListener(t,e=>e.preventDefault()));
document.addEventListener('drop', e=>{ const fs=[...(e.dataTransfer?.files||[])]; const f=fs.find(x=>/^(audio|video)\//.test(x.type))||fs[0]; if(!f) return;
  const id = (e.clientX < window.innerWidth/2) ? 'A' : 'B'; loadFile(id,f); });

window.addEventListener('resize', ()=>{ resize3D(); for(const id in decks){ if(decks[id].peaks) buildWaveCache(decks[id]); else fit(decks[id].wave); } });

// =========================== ГЛАВНЫЙ ЦИКЛ ===========================
let last=performance.now();
function frame(now){
  let dt=(now-last)/1000; last=now; if(dt>0.05)dt=0.05;

  // физика волчка
  const m=V.mode;
  if(V.touching){ if(now-V.lastMoveT>40) V.omegaFinger*=0.5; V.r += ((V.omegaFinger/OMEGA_REF)-V.r)*m.mu*dt; }
  V.r += -m.lambda*(V.r-V.r0)*dt;
  V.r = Math.max(-m.rMax, Math.min(m.rMax, V.r));

  // скорость в деки по привязке
  if(AUDIO.ctx){
    for(const id in decks){ const d=decks[id]; if(!d.node) continue;
      let target;
      if(d.bound) target = (d.playing || V.touching) ? V.r : 0;
      else target = d.playing ? 1 : 0;
      d.node.parameters.get('rate').setTargetAtTime(target, AUDIO.ctx.currentTime, RATE_TC);
    }
  }

  // вращение 3D-диска
  const anyLive = (decks.A.bound&&decks.A.playing)||(decks.B.bound&&decks.B.playing);
  const eff = (anyLive || V.touching) ? V.r : 0;
  if(discSpin) discSpin.rotation.y += eff * SPIN_1X_RADPS * dt;

  // свечение обода по скорости + уровень
  let level=0;
  if(AUDIO.analyser){ AUDIO.analyser.getByteTimeDomainData(AUDIO.anaBuf); let s=0;
    for(let i=0;i<AUDIO.anaBuf.length;i++){const x=(AUDIO.anaBuf[i]-128)/128; s+=x*x;} level=Math.min(1,Math.sqrt(s/AUDIO.anaBuf.length)*3); }
  const col=speedColor(V.r); const dev=Math.min(1,Math.abs(V.r-1)/1.5);

  // тактильная шероховатость: импульсы по проскальзыванию пальца о поверхность
  if(V.touching && HAPTIC.enabled && (navigator.vibrate || iosHapticInput)){
    const discAngVel = eff * SPIN_1X_RADPS;
    const slip = Math.abs(V.omegaFinger - discAngVel);
    HAPTIC.accum += slip * dt;
    const step = 2*Math.PI/HAPTIC_GROOVES;
    if(HAPTIC.accum > step*6) HAPTIC.accum = step*6;          // не копим backlog
    while(HAPTIC.accum >= step){
      if(now - HAPTIC.lastVib >= HAPTIC_MIN_MS){
        const k = Math.min(1, slip/(SPIN_1X_RADPS*2));
        const dur = HAPTIC_PULSE[0] + (HAPTIC_PULSE[1]-HAPTIC_PULSE[0])*k;
        haptic(Math.max(4, Math.round(dur*(0.8+Math.random()*0.4)))); // лёгкая нерегулярность = «песок»
        HAPTIC.lastVib = now; HAPTIC.accum -= step;
      } else break;
    }
  }

  if(rim){ rim.material.color.setRGB(col[0]/255,col[1]/255,col[2]/255);
    rim.material.emissive.setRGB(col[0]/255,col[1]/255,col[2]/255);
    rim.material.emissiveIntensity = 0.9 + dev*1.6 + level*0.5; }

  // readout
  rateVal.textContent=(V.r>=0?'':'-')+Math.abs(V.r).toFixed(2)+'×';
  rateVal.style.color=rgb(col,1);

  if(renderer) renderer.render(scene,camera);
  drawWaveDeck(decks.A); drawWaveDeck(decks.B);
  requestAnimationFrame(frame);
}

// старт
for(const id in decks) fit(decks[id].wave);
if(!navigator.vibrate) setupIOSHaptic();
init3D(); resize3D(); bindWheelInput(); updateBoundLabel();
requestAnimationFrame(frame);
</script>
</body>
</html>
